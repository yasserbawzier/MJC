<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة أنواع المنتجات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="App.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">إدارة أنواع المنتجات</h1>
                <p class="text-gray-600 mt-2">عرض وإدارة جميع أنواع المنتجات بنفس واجهة العملاء.</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="showAddTypeModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">إضافة نوع جديد</button>
                <a href="products.html" class="bg-gray-200 text-gray-800 px-6 py-2 rounded-lg hover:bg-gray-300">العودة إلى المنتجات</a>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4 text-gray-600 font-bold">اسم النوع</th>
                        <th class="p-4 text-gray-600 font-bold">وصف النوع</th>
                        <th class="p-4 text-gray-600 font-bold">تاريخ الإضافة</th>
                        <th class="p-4 text-gray-600 font-bold text-left">Actions</th>
                    </tr>
                </thead>
                <tbody id="productTypesTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="addTypeModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 overflow-hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">إضافة نوع جديد</h2>
            <form id="addTypeForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">اسم النوع</label>
                    <input type="text" id="typeName" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">وصف النوع</label>
                    <textarea id="typeDescription" rows="3" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" onclick="closeAddTypeModal()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">إلغاء</button>
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">حفظ النوع</button>
                </div>
            </form>
        </div>
    </div>

    <div id="editTypeModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 overflow-hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">تعديل النوع</h2>
            <form id="editTypeForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">اسم النوع</label>
                    <input type="text" id="editTypeName" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">وصف النوع</label>
                    <textarea id="editTypeDescription" rows="3" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" onclick="closeEditTypeModal()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">إلغاء</button>
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">حفظ التعديلات</button>
                </div>
            </form>
        </div>
    </div>

    <script src="product_types.js"></script>
</body>
</html>
