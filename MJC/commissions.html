<!-- doctype html: يخبر المتصفح أن هذا الملف HTML5 -->
<!DOCTYPE html>

<!-- html: العنصر الأساسي لكل الصفحة -->
<html lang="ar" dir="rtl">
<head>
    <!-- دعم العربية -->
    <meta charset="UTF-8">

    <!-- اسم الصفحة في التبويب -->
    <title>إدارة العمولات</title>

    <!-- مكتبة تنسيق الواجهة -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ملف CSS العام -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">إدارة العمولات</h1>

            <!-- زر إضافة عمولة جديدة -->
            <button onclick="showAddCommissionModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                Add Commission
            </button>
        </header>

        <!-- جدول العمولات -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <!-- لا نعرض id للمستخدم -->
                        <th class="p-4 text-gray-600 font-bold">نسبة العمولة</th>
                        <th class="p-4 text-gray-600 font-bold">تاريخ الإنشاء</th>
                        <th class="p-4 text-gray-600 font-bold text-left">الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="commissionsTableBody">
                    <!-- سيتم تعبئته من commissions.js -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- مودال الإضافة -->
    <div id="addCommissionModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 overflow-hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">إضافة عمولة</h2>

            <form id="addCommissionForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">نسبة العمولة</label>
                    <input type="number" step="0.01" id="commissionRate" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="flex justify-end space-x-3 mt-8 gap-2">
                    <button type="button" onclick="closeAddCommissionModal()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">إلغاء</button>
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- مودال التعديل -->
    <div id="editCommissionModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 overflow-hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">تعديل العمولة</h2>

            <form id="editCommissionForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">نسبة العمولة</label>
                    <input type="number" step="0.01" id="editCommissionRate" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="flex justify-end space-x-3 mt-8 gap-2">
                    <button type="button" onclick="closeEditCommissionModal()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">إلغاء</button>
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">حفظ التعديلات</button>
                </div>
            </form>
        </div>
    </div>

    <!-- app.js أولاً ثم منطق الصفحة -->
    <script src="app.js"></script>
    <script src="commissions.js"></script>
</body>
</html>
